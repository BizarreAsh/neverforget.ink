<!DOCTYPE html>
<html lang="ru">
<head>

  <title>NeverForget — Каталог</title>
  <link rel="stylesheet" href="style.css">

  <header>
    <a class="logo" href="index.html">📚 NeverForget</a>

      <button class="lang-btn" data-lang="de">DE</button>

      <h2 data-i18n="contacts_title">Контакты</h2>
      <a class="contact-email" href="mailto:bizarre.ash@proton.me">bizarre.ash@proton.me</a>
