<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeverForget — История</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a class="logo" href="index.html">📚 NeverForget</a>
    <nav>
      <a href="catalog.html" data-i18n="nav_catalog">Каталог</a>
      <a href="favorites.html" data-i18n="nav_favorites">Избранное</a>
      <a href="history.html" data-i18n="nav_history" class="nav-active">История</a>
      <a href="about.html" data-i18n="nav_about">О нас</a>
      <a href="#" data-i18n="nav_contacts">Контакты</a>
    </nav>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="ru">🇷🇺 RU</button>
      <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
      <button class="lang-btn" data-lang="de">🇩🇪 DE</button>
    </div>
  </header>

  <section class="history-section">
    <h1 data-i18n="history_title">История</h1>
    <div id="history-grid" class="books-grid"></div>
    <div id="history-empty" class="fav-empty" hidden>
      <div class="fav-empty-icon">📖</div>
      <p data-i18n="history_empty_title">Ещё ничего не прочитано</p>
      <p data-i18n="history_empty_hint">Нажми ○ на любой книге, чтобы отметить её прочитанной</p>
    </div>
  </section>

  <footer>
    <a class="support-btn" href="https://ko-fi.com/bizarreash" target="_blank" rel="noopener">☕ <span data-i18n="support_btn">Поддержать автора</span></a>
    <p data-i18n="footer_text">© 2026 NeverForget.ink — Все права защищены</p>
  </footer>

  <div id="contacts-modal" class="modal-overlay">
    <div class="modal-card contacts-card">
      <button class="modal-close" aria-label="Закрыть">×</button>
      <h2 data-i18n="contacts_title">Контакты</h2>
      <a class="contact-email" href="mailto:bizarre.ash@proton.me">bizarre.ash@proton.me</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
